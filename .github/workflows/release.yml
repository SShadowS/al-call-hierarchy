name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout al-call-hierarchy
        uses: actions/checkout@v4

      - name: Checkout tree-sitter-al
        uses: actions/checkout@v4
        with:
          repository: SShadowS/tree-sitter-al
          path: tree-sitter-al

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        env:
          TREE_SITTER_AL_PATH: ${{ github.workspace }}/tree-sitter-al
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: al-call-hierarchy-windows-x64
          path: target/release/al-call-hierarchy.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout al-call-hierarchy
        uses: actions/checkout@v4

      - name: Checkout tree-sitter-al
        uses: actions/checkout@v4
        with:
          repository: SShadowS/tree-sitter-al
          path: tree-sitter-al

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        env:
          TREE_SITTER_AL_PATH: ${{ github.workspace }}/tree-sitter-al
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: al-call-hierarchy-linux-x64
          path: target/release/al-call-hierarchy

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: al-call-hierarchy-windows-x64
          path: windows

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: al-call-hierarchy-linux-x64
          path: linux

      - name: Rename binaries
        run: |
          mv windows/al-call-hierarchy.exe al-call-hierarchy-windows-x64.exe
          mv linux/al-call-hierarchy al-call-hierarchy-linux-x64
          chmod +x al-call-hierarchy-linux-x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            al-call-hierarchy-windows-x64.exe
            al-call-hierarchy-linux-x64
