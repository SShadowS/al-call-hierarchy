name: CI

on:
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout al-call-hierarchy
        uses: actions/checkout@v4

      - name: Checkout tree-sitter-al
        uses: actions/checkout@v4
        with:
          repository: SShadowS/tree-sitter-al
          path: tree-sitter-al

      - name: Install Rust
        # No `toolchain:` input → the action reads the pinned channel + components
        # from rust-toolchain.toml (single source of truth, matches local dev).
        uses: dtolnay/rust-toolchain@master

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        env:
          TREE_SITTER_AL_PATH: ${{ github.workspace }}/tree-sitter-al
        run: cargo clippy --release -- -D warnings

      - name: Generated vocab is fresh
        env:
          TREE_SITTER_AL_PATH: ${{ github.workspace }}/tree-sitter-al
        run: |
          cargo run -p xtask -- gen-syntax
          git diff --exit-code crates/al-syntax/src/raw/generated

      - name: Test
        env:
          TREE_SITTER_AL_PATH: ${{ github.workspace }}/tree-sitter-al
        run: cargo test --workspace

      - name: Build
        env:
          TREE_SITTER_AL_PATH: ${{ github.workspace }}/tree-sitter-al
        run: cargo build --release
