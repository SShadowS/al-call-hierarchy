name: CI

on:
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout al-call-hierarchy
        uses: actions/checkout@v4

      - name: Checkout tree-sitter-al
        uses: actions/checkout@v4
        with:
          repository: SShadowS/tree-sitter-al
          path: tree-sitter-al

      - name: Install Rust
        # `@stable` installs a base stable + rustfmt/clippy; the actual version every
        # `cargo` command runs under is pinned by rust-toolchain.toml (rustup override),
        # so that file stays the single source of truth.
        uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        env:
          TREE_SITTER_AL_PATH: ${{ github.workspace }}/tree-sitter-al
        run: cargo clippy --release -- -D warnings

      - name: Generated vocab is fresh
        env:
          TREE_SITTER_AL_PATH: ${{ github.workspace }}/tree-sitter-al
        run: |
          cargo run -p xtask -- gen-syntax
          git diff --exit-code crates/al-syntax/src/raw/generated

      - name: Test
        env:
          TREE_SITTER_AL_PATH: ${{ github.workspace }}/tree-sitter-al
        run: cargo test --workspace

      - name: Build
        env:
          TREE_SITTER_AL_PATH: ${{ github.workspace }}/tree-sitter-al
        run: cargo build --release

      - name: Perf bounds (release-only; 3x CLAUDE.md targets, T0.5)
        env:
          TREE_SITTER_AL_PATH: ${{ github.workspace }}/tree-sitter-al
        # Reuses the release build above (same profile, same target/ dir) —
        # this only compiles+links the test binary. The bounds checks are
        # `#[cfg(not(debug_assertions))]`-gated in tests/perf_bounds.rs, so
        # `--release` is what makes them compile in at all; see that file's
        # module doc for why a debug-build timing assert would be meaningless.
        run: cargo test --release --test perf_bounds
